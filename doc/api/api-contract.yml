# @version 1.1
# @description Risk Guard 統一 API 規範
# @project risk-guard

openapi: 3.0.3
info:
  title: Risk Guard API
  description: 系統核心 API 規範，包含認證模組與選單模組。
  version: 1.1.0

servers:
  - url: /api
    description: 專案基礎路徑

paths:
  # --- Authentication ---
  /auth/login:
    post:
      tags: [Authentication]
      summary: 使用者登入
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登入成功，核發 JWT 並寫入 HttpOnly Cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_LoginResponse'

  /auth/register:
    post:
      tags: [Authentication]
      summary: 使用者註冊
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 註冊成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_LoginResponse'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: 刷新 Access Token
      description: 依賴 Cookie 中的 refresh_token
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_LoginResponse'

  /auth/me:
    get:
      tags: [Authentication]
      summary: 獲取當前用戶資訊
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功獲取資訊
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserInfo'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: 使用者登出
      responses:
        '200':
          description: 登出成功

  # --- Menu ---
  /menu:
    get:
      tags: [Menu]
      summary: 獲取使用者選單
      description: 根據當前登入使用者的權限，返回經過濾後的導航選單。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功返回選單數據
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MenuList'

components:
  schemas:
    LoginRequest:
      type: object
      properties:
        email: { type: string, format: email }
        username: { type: string }
        password: { type: string, format: password }

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        username: { type: string }
        password: { type: string, format: password }

    LoginResponse:
      type: object
      properties:
        accessToken: { type: string }
        user: { $ref: '#/components/schemas/UserInfo' }

    UserInfo:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string }
        username: { type: string }
        roles: { type: array, items: { type: string } }

    MenuItem:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        path: { type: string }
        icon: { type: string }
        children:
          type: array
          items: { $ref: '#/components/schemas/MenuItem' }

    ApiResponse_LoginResponse:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data: { $ref: '#/components/schemas/LoginResponse' }

    ApiResponse_UserInfo:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data: { $ref: '#/components/schemas/UserInfo' }

    ApiResponse_MenuList:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/MenuItem' }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
