# @version 1.2
# @description Risk Guard 統一 API 規範 (已同步最新重構風格)
# @project risk-guard

openapi: 3.0.3
info:
  title: Risk Guard API
  description: 系統核心 API 規範，包含認證模組與選單模組。已採用 ResponseEntity<ApiResponse<T>> 統一回傳風格。
  version: 1.2.0

servers:
  - url: /api
    description: 專案基礎路徑

paths:
  # --- Authentication ---
  /auth/login:
    post:
      tags: [Authentication]
      summary: 使用者登入
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登入成功，核發 JWT 並寫入 HttpOnly Cookie (access_token, refresh_token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_LoginResponse'

  /auth/register:
    post:
      tags: [Authentication]
      summary: 使用者註冊
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 註冊成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_LoginResponse'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: 刷新 Access Token
      description: 支援從 Request Body 或 Cookie 中的 refresh_token 讀取。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string, description: "可選，若無則從 Cookie 讀取" }
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_LoginResponse'

  /auth/me:
    get:
      tags: [Authentication]
      summary: 獲取當前用戶資訊
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功獲取資訊
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserInfo'
        '401':
          description: 未登入或 Token 已失效

  /auth/logout:
    post:
      tags: [Authentication]
      summary: 使用者登出
      responses:
        '200':
          description: 登出成功，並清除相關 HttpOnly Cookies

  # --- Menu ---
  /menu:
    get:
      tags: [Menu]
      summary: 獲取使用者選單
      description: 根據當前登入使用者的權限，返回經過濾後的導航選單。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功返回選單數據
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MenuList'

components:
  schemas:
    LoginRequest:
      type: object
      required: [password]
      properties:
        email: { type: string, format: email }
        username: { type: string }
        password: { type: string, format: password }

    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email: { type: string, format: email }
        username: { type: string, minLength: 3, maxLength: 20 }
        password: { type: string, format: password, minLength: 6 }

    LoginResponse:
      type: object
      properties:
        accessToken: { type: string }
        user: { $ref: '#/components/schemas/UserInfo' }

    UserInfo:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string }
        name: { type: string, description: "與後端 UserInfo.name 對齊" }
        roles: { type: array, items: { type: string } }

    MenuItem:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        path: { type: string }
        icon: { type: string }
        children:
          type: array
          items: { $ref: '#/components/schemas/MenuItem' }

    ApiResponse_LoginResponse:
      type: object
      properties:
        code: { type: integer, example: 200 }
        message: { type: string, example: "操作成功" }
        data: { $ref: '#/components/schemas/LoginResponse' }
        timestamp: { type: integer, format: int64 }

    ApiResponse_UserInfo:
      type: object
      properties:
        code: { type: integer, example: 200 }
        message: { type: string, example: "操作成功" }
        data: { $ref: '#/components/schemas/UserInfo' }
        timestamp: { type: integer, format: int64 }

    ApiResponse_MenuList:
      type: object
      properties:
        code: { type: integer, example: 200 }
        message: { type: string, example: "操作成功" }
        data:
          type: array
          items: { $ref: '#/components/schemas/MenuItem' }
        timestamp: { type: integer, format: int64 }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
