# @version 1.0
# @description risk-guard 專案全域開發上下文文件
# @project risk-guard

project: /home/sixson/IdeaProjects/risk-guard

# 核心技術規範
context:
  stack:
    - Java 21
    - Spring Boot 4.0.0
    - Maven 3.8+
    - PostgreSQL 16+
    - Hibernate 7.1.11 / Spring Data JPA
    - Spring Security (JWT)
    - Lombok 1.18.42
  architecture: "Hexagonal Architecture (Ports and Adapters)"
  api_base_path: "/api"
  database:
    host: "localhost"
    port: 5432
    user: "sa"
    password: "A@t123456"
    dbname: "mydatabase"

# 模組化職責定義 (Scope)
scope:
  modules:
    - name: "guard-domain"
      role: "核心業務邏輯層 (Core)"
      content: "Entities, Value Objects, Repository Interfaces (Ports)"
      dependencies: ["None (JDK only)"]
    - name: "guard-application"
      role: "應用層 (Use Cases)"
      content: "Services, DTOs, Application Logic"
      dependencies: ["guard-domain"]
    - name: "guard-infrastructure"
      role: "基礎設施層 (Driven Adapters)"
      content: "JPA Repositories, Entity Mappings, External Integrations"
      dependencies: ["guard-domain"]
    - name: "guard-api"
      role: "介面層 (Driving Adapters)"
      content: "REST Controllers, Request/Response DTOs, Exception Handlers"
      dependencies: ["guard-application"]
    - name: "guard-auth"
      role: "安全性與認證層"
      content: "Spring Security Config, JWT Filters, UserDetails Service"
      dependencies: ["guard-domain", "guard-application"]
    - name: "guard-bootstrap"
      role: "啟動與配置層"
      content: "Spring Boot Application Main, Configuration Files (YAML)"
      dependencies: ["All Modules"]

# 開發規範與意圖 (Intent)
intent:
  description: "建立一個高內聚、低耦合的後端系統，為 React 前端提供穩定的 RESTful API 支援。"
  technical_rules:
    - "DI_Style: 優先使用建構子注入 (Constructor Injection)"
    - "Lombok: 使用 @Data, @Builder, @RequiredArgsConstructor"
    - "Separation: 嚴格遵守六邊形架構，不要在 Domain 層引入框架依賴"
    - "Security: 所有 API 需通過 JWT 認證，除非明確排除"

# 關鍵文件路徑
files:
  main_entry: "guard-bootstrap/src/main/java/com/GuardApplication.java"
  security_config: "guard-auth/src/main/java/com/security/SecurityConfig.java"
  db_config: "guard-bootstrap/src/main/resources/application-db.yml"
  auth_controller: "guard-api/src/main/java/com/controllers/auth/AuthController.java"

# 預期產出與驗證 (Output/Validation)
output:
  expectation:
    - "程式碼結構符合 Maven 多模組規範"
    - "單元測試覆蓋核心業務邏輯 (Domain/Application)"
    - "API 符合 RESTful 規範並回傳 JSON 格式"
  validation_checkpoints:
    - "mvn clean install 是否成功編譯"
    - "資料庫連線是否正確 (check application-db.yml)"
    - "AuthController 是否能正確處理登入與 Token 刷新"